name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build release
        run: cargo build --release --locked

      - name: Build macOS x86_64
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Build macOS ARM64
        run: |
          rustup target add aarch64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin

      - name: Build Linux
        run: |
          rustup target add x86_64-unknown-linux-gnu
          cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release

          if [ -f target/x86_64-apple-darwin/release/smart-skills ]; then
            tar -czf release/smart-skills-x86_64-apple-darwin.tar.gz \
              -C target/x86_64-apple-darwin/release smart-skills
          fi

          if [ -f target/aarch64-apple-darwin/release/smart-skills ]; then
            tar -czf release/smart-skills-aarch64-apple-darwin.tar.gz \
              -C target/aarch64-apple-darwin/release smart-skills
          fi

          if [ -f target/x86_64-unknown-linux-gnu/release/smart-skills ]; then
            tar -czf release/smart-skills-x86_64-unknown-linux-gnu.tar.gz \
              -C target/x86_64-unknown-linux-gnu/release smart-skills
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
